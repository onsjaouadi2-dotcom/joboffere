version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql-jobboard
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jobboard_offres
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - jobboard-network

  mongodb:
    image: mongo:6.0
    container_name: mongodb-jobboard
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - jobboard-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-jobboard
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - jobboard-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - jobboard-network

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    environment:
      - eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
    networks:
      - jobboard-network

  ms-offres:
    build: ./ms-offres
    container_name: ms-offres
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
    environment:
      - spring.datasource.url=jdbc:mysql://mysql:3306/jobboard_offres?createDatabaseIfNotExist=true
      - spring.datasource.username=root
      - spring.datasource.password=root
      - eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
      - spring.rabbitmq.host=rabbitmq
      - spring.config.import=optional:configserver:http://config-server:8888
    networks:
      - jobboard-network

  ms-candidats:
    build: ./ms-candidats
    container_name: ms-candidats
    ports:
      - "8082:8082"
    depends_on:
      - mongodb
      - eureka-server
      - rabbitmq
    environment:
      - MONGO_URL=mongodb://mongodb:27017/jobboard_candidats
      - EUREKA_HOST=eureka-server
      - RABBITMQ_HOST=rabbitmq
    networks:
      - jobboard-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8093:8093"
    depends_on:
      - eureka-server
    environment:
      - eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
      - spring.security.oauth2.resourceserver.jwt.issuer-uri=http://host.docker.internal:8080/realms/JobBoardRealm
      - spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://host.docker.internal:8080/realms/JobBoardRealm/protocol/openid-connect/certs
    networks:
      - jobboard-network

networks:
  jobboard-network:
    driver: bridge

volumes:
  mysql_data:
  mongo_data: